  subjects:
    - slug: real-analysis
      en: Real Analysis
      es: Análisis Real
    - slug: complex-analysis
      en: Complex Analysis
      es: Análisis Complejo
    - slug: differential-equations
      en: Differential Equations
      es: Ecuaciones Diferenciales
    - slug: functional-analysis
      en: Functional Analysis
      es: Análisis Funcional
    - slug: measure-integration
      en: Measure & Integration
      es: Medida e Integración

- slug: geometry-topology
  page: /geometry-topology.html
  en: Geometry & Topology
  es: Geometría y Topología
  blurb_en: Shape, space, smoothness, and the properties preserved under deformation.
  blurb_es: Forma, espacio, suavidad y las propiedades que se preservan bajo deformación.
