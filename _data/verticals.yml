# ==========================================================================
# Mathematical verticals (subject areas) and their sub-areas.
# Navigation, the landing page, and the per-vertical pages all read from
# this file, so this is the single source of truth for the taxonomy.
#
# Each subject `slug` matches the `subject:` field in a post's front matter.
# To file a post under a subject, set `subject: <slug>` in its front matter.
# A post may list several slugs separated by commas (e.g.
# `subject: topology, real-analysis`) to appear under multiple subjects at once.
# ==========================================================================

- slug: foundations
  page: /foundations.html
  en: Foundations
  es: Fundamentos
  blurb_en: Logic, set theory, and the discrete structures everything else is built on.
  blurb_es: Lógica, teoría de conjuntos y las estructuras discretas sobre las que se construye todo lo demás.
  subjects:
    - slug: logic-set-theory
      en: Logic & Set Theory
      es: Lógica y Teoría de Conjuntos
    - slug: number-systems
      en: Number Systems
      es: Sistemas Numéricos
    - slug: graph-theory
      en: Graph Theory
      es: Teoría de Grafos
    - slug: methods
      en: Methods
      es: Métodos

- slug: algebra
  page: /algebra.html
  en: Algebra
  es: Álgebra
  blurb_en: Vector spaces, linear maps, and abstract algebraic structures.
  blurb_es: Espacios vectoriales, aplicaciones lineales y estructuras algebraicas abstractas.
  subjects:
    - slug: linear-algebra
      en: Linear Algebra
      es: Álgebra Lineal
    - slug: abstract-algebra
      en: Abstract Algebra
      es: Álgebra Abstracta

- slug: analysis
  page: /analysis.html
  en: Analysis
  es: Análisis
